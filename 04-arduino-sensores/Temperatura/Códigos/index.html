<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Arduino IoT - sensor DHT11</title>
    <style>
        body {
            font-family: sans-serif;
            text-align: center;
        }
        h1 {
            font-size: 1.9rem;
            color:#0000ff;
        }

        #alerta {
            color: #ff0000;
            font-size: 1.5rem;
            margin-top: 30px;
        }
        
    </style>
</head>
<body>
    <h1>Monitor de Temperatura e Umidade</h1>
    <h2>Temperatura</h2>
    <div id="temp">--</div>
    <h2>Umidade</h2>
    <div id="umi">--</div>
    <div id="alerta"></div>

    <script>
        function atualizar() {
            fetch("/json")
            .then(res => res.json())
            .then(dados => {
                let t = dados.t
                let h = dados.h
                
                document.getElementById("temp").innerHTML =  t + " ºC"
                document.getElementById("umi").innerHTML =  h + " %"

                let alerta = document.getElementById("alerta")
                if (t > 26) {
                  alerta.innerHTML = "ALERTA:<br>Temperatura acima de 26 ºC"
                } else {
                  alerta.innerHTML = ""
                }
            })
        }
        setInterval(atualizar, 2000)
    </script>
</body>
</html>
